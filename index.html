<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Validador de CEP — Renan Dev</title>
<meta name="description" content="Digite um CEP e veja o endereço preencher automaticamente. Projeto de prática com Fetch API e JavaScript."/>
</head>
<body>

<div class="card">
  <div class="tag">Prática — Fetch GET + blur</div>
  <h1>Busca de <span>endereço</span></h1>
  <p class="subtitle">Digite o CEP e clique fora — o restante preenche sozinho.</p>

  <!-- CEP -->
  <div class="field">
    <label>CEP</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
      <!-- Spinner que controlaa via JS -->
      <svg class="cep-loader" id="loader" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
    </div>
  </div>

  <div class="divider">
    <span class="divider-label">preenchimento automático</span>
  </div>

  <!-- Rua -->
  <div class="field">
    <label>Rua</label>
    <div class="input-wrap">
      <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <input type="text" id="rua" placeholder="Preenchido pelo CEP" disabled />
    </div>
  </div>

  <!-- Número + Bairro -->
  <div class="field-row">
    <div>
      <label>Número</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 9h6M9 12h6M9 15h4"/>
        </svg>
        <input type="text" id="numero" placeholder="Ex: 42" disabled />
      </div>
    </div>
    <div>
      <label>Bairro</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        <input type="text" id="bairro" placeholder="Preenchido pelo CEP" disabled />
      </div>
    </div>
  </div>

  <!-- Cidade / Estado -->
  <div class="field-row">
    <div>
      <label>Cidade</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
        <input type="text" id="cidade" placeholder="Preenchido pelo CEP" disabled />
      </div>
    </div>
    <div>
      <label>Estado</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3h18M3 12h18M3 21h18"/>
        </svg>
        <input type="text" id="estado" placeholder="UF" disabled />
      </div>
    </div>
  </div>

  <div id="status"></div>
</div>

<script src="script.js"></script>
</body>
</html>
